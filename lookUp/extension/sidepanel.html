<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LookUp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      padding: 12px 16px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 17px;
      font-weight: 800;
      background: linear-gradient(135deg, #7c6af5, #5eead4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ef4444;
      margin-left: auto;
      transition: background 0.3s;
    }
    .status-dot.online { background: #22c55e; }

    /* MODE TABS */
    .mode-selector {
      display: flex;
      gap: 4px;
      padding: 10px 12px;
      border-bottom: 1px solid #1e1e2e;
      flex-shrink: 0;
    }
    .mode-btn {
      flex: 1;
      padding: 6px 2px;
      font-size: 10px;
      font-weight: 700;
      border: 1px solid #2a2a3e;
      border-radius: 7px;
      background: transparent;
      color: #666;
      cursor: pointer;
      transition: all 0.18s;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .mode-btn.active { background: #7c6af5; border-color: #7c6af5; color: #fff; }
    .mode-btn[data-mode="flashcard"].active { background: #f59e0b; border-color: #f59e0b; }
    .mode-btn[data-mode="audio"].active { background: #ec4899; border-color: #ec4899; }
    .mode-btn:hover:not(.active) { border-color: #7c6af5; color: #ccc; }

    /* CONTROLS */
    .controls {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid #1e1e2e;
    }
    .title-input input {
      width: 100%;
      padding: 7px 10px;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 7px;
      color: #e8e8f0;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .title-input input:focus { border-color: #7c6af5; }
    .title-input input::placeholder { color: #444; }

    .action-row { display: flex; gap: 6px; }
    .btn-primary {
      flex: 1;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      border-radius: 9px;
      background: linear-gradient(135deg, #7c6af5, #5eead4);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-secondary {
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #2a2a3e;
      border-radius: 9px;
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .btn-secondary:hover { border-color: #7c6af5; color: #ccc; }

    /* SESSION BAR */
    .session-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #12122a;
      border-bottom: 1px solid #1e1e2e;
      font-size: 12px;
      flex-shrink: 0;
    }
    .session-bar.active { display: flex; }
    .session-count {
      background: #7c6af5;
      color: #fff;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .session-finish {
      margin-left: auto;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 700;
      border: none;
      border-radius: 7px;
      background: #5eead4;
      color: #0f0f13;
      cursor: pointer;
    }
    .session-cancel {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
    }

    /* AUDIO BAR */
    .audio-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #1a0a1a;
      border-bottom: 1px solid #1e1e2e;
      flex-shrink: 0;
    }
    .audio-bar.active { display: flex; }
    .rec-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ec4899;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .rec-timer { font-size: 13px; font-weight: 700; color: #ec4899; font-variant-numeric: tabular-nums; }
    .stop-btn {
      margin-left: auto;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 700;
      border: none;
      border-radius: 7px;
      background: #ec4899;
      color: #fff;
      cursor: pointer;
    }

    /* RESULT AREA */
    .result-area { flex: 1; overflow-y: auto; padding: 12px; }
    .placeholder {
      color: #444;
      font-size: 12px;
      text-align: center;
      margin-top: 32px;
      line-height: 1.7;
    }
    .result-card {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 11px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .saved-badge {
      display: inline-block;
      margin-bottom: 8px;
      padding: 2px 7px;
      background: #14532d;
      color: #86efac;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 700;
    }
    .error-card {
      background: #2a1a1a;
      border: 1px solid #7f1d1d;
      border-radius: 11px;
      padding: 12px;
      font-size: 12px;
      color: #fca5a5;
    }
    .spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px 0;
      color: #7c6af5;
      font-size: 12px;
    }
    .spinner::before {
      content: "";
      width: 18px; height: 18px;
      border: 2px solid #2a2a3e;
      border-top-color: #7c6af5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FLASHCARDS */
    .flashcard-grid { display: flex; flex-direction: column; gap: 10px; }
    .flashcard { perspective: 600px; cursor: pointer; height: 100px; }
    .flashcard-inner {
      position: relative;
      width: 100%; height: 100%;
      transition: transform 0.4s;
      transform-style: preserve-3d;
    }
    .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
    .flashcard-front, .flashcard-back {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      text-align: center;
      font-size: 12px;
      line-height: 1.5;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .flashcard-front { background: #1a1a2e; border: 1px solid #7c6af5; font-weight: 600; }
    .flashcard-back { background: #1a2a1a; border: 1px solid #5eead4; color: #a7f3d0; transform: rotateY(180deg); }
    .card-hint { font-size: 10px; color: #555; text-align: center; margin-top: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>LookUp</h1>
    <span style="font-size:10px;color:#555">Study Sensei</span>
    <div class="status-dot" id="statusDot"></div>
  </header>

  <div class="mode-selector">
    <button class="mode-btn active" data-mode="summary">Summary</button>
    <button class="mode-btn" data-mode="explain">Explain</button>
    <button class="mode-btn" data-mode="quiz">Quiz</button>
    <button class="mode-btn" data-mode="flashcard">Cards</button>
    <button class="mode-btn" data-mode="audio">Audio</button>
  </div>

  <div class="session-bar" id="sessionBar">
    <span>Session:</span>
    <span class="session-count" id="sessionCount">0 slides</span>
    <button class="session-finish" id="sessionFinish">Finish &amp; Summarize</button>
    <button class="session-cancel" id="sessionCancel" title="Cancel">✕</button>
  </div>

  <div class="audio-bar" id="audioBar">
    <div class="rec-dot"></div>
    <span class="rec-timer" id="recTimer">0:00</span>
    <span style="font-size:11px;color:#888">Recording tab audio…</span>
    <button class="stop-btn" id="stopAudio">Stop &amp; Transcribe</button>
  </div>

  <div class="controls">
    <div class="title-input">
      <input type="text" id="titleInput" placeholder="Note title (optional)" maxlength="80" />
    </div>
    <div class="action-row">
      <button class="btn-primary" id="captureBtn">Capture &amp; Analyze</button>
      <button class="btn-secondary" id="sessionBtn">+ Session</button>
    </div>
  </div>

  <div class="result-area" id="resultArea">
    <p class="placeholder">
      Capture a tab for an AI study breakdown.<br>
      Use <strong>+ Session</strong> to combine multiple slides.<br>
      Switch to <strong>Audio</strong> to transcribe video lectures.
    </p>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
