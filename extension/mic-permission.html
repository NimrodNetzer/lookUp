<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LookUp — Microphone Permission</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f13; color: #e8e8f0;
      font-family: Inter, system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 18px;
    }
    .icon  { font-size: 40px; }
    h2     { font-size: 16px; font-weight: 700; color: #e8e8f0; }
    p      { font-size: 12px; color: #888; text-align: center; max-width: 280px; line-height: 1.6; }
    button {
      margin-top: 4px;
      padding: 10px 28px; font-size: 14px; font-weight: 700;
      border: none; border-radius: 10px;
      background: linear-gradient(135deg, #7c6af5, #5b53d4);
      color: #fff; cursor: pointer;
      box-shadow: 0 2px 12px rgba(124,106,245,0.4);
    }
    button:hover   { opacity: 0.88; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status { font-size: 12px; color: #888; min-height: 18px; }
  </style>
</head>
<body>
  <div class="icon">🎤</div>
  <h2>Microphone Access</h2>
  <p>LookUp needs microphone access to record audio. Click the button below — Chrome will ask you to allow it.</p>
  <button id="btn">Allow Microphone</button>
  <span id="status"></span>
  <script src="mic-permission.js"></script>
</body>
</html>
